services:
  - type: web
    name: zse-streamlit-dashboard
    runtime: python
    repo: https://github.com/makambashallumtadiwa-sys/zse-streamlit-dashboard
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0